<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="utf-8" />
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(n) { caches.delete(n); });
        });
      }
    }
  </script>
  <meta name="theme-color" content="#1E3A5F" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Deepseek - An open source chat application with support for multiple AI models" />
  <link rel="icon" href="/assets/mep/favicon.ico" />
  <title>MEP</title>
  <script src="PROTOCAL_IGNORE/assets/mep/config.js?v=<%= Date.now() %>"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
  </style>
  <!-- <script src="http://192.168.2.224:9000/vditor.js" defer></script> -->
  <script>
    document.title = window.BRAND_CONFIG.brandName.en

    // Load ThemeStyle (logos, colors) from backend - same as admin panel
    ;(function() {
      var host = window.APP_CONFIG ? window.APP_CONFIG.baseUrl : '';
      fetch(host + '/api/v1/web/config').then(function(res) {
        return res.json();
      }).then(function(res) {
        var styleStr = res.data ? res.data.value : '';
        var style = styleStr ? JSON.parse(styleStr) : { comp: {}, bg: '', logos: {} };
        window.ThemeStyle = style;
        if (style.logos && style.logos['favicon']) {
          var link = document.querySelector("link[rel='icon']");
          if (link) link.href = style.logos['favicon'];
        }
      }).catch(function() {
        window.ThemeStyle = { comp: {}, bg: '', logos: {} };
      });
    })();

    const theme = localStorage.getItem('color-theme');
    const loadingContainerStyle = document.createElement('style');
    let backgroundColor;

    if (theme === 'dark') {
      backgroundColor = '#0C1A2E';
    } else if (theme === 'light') {
      backgroundColor = '#F8FAFC';
    } else if (theme === 'system') {
      const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
      backgroundColor = prefersDarkScheme ? '#0C1A2E' : '#F8FAFC';
    } else {
      backgroundColor = '#F8FAFC';
    }

    loadingContainerStyle.innerHTML = `
        #loading-container {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background-color: ${backgroundColor};
        }
      `;
    document.head.appendChild(loadingContainerStyle);
  </script>
  <script defer type="module" src="/src/main.jsx"></script>
</head>

<body>
  <div id="root">
    <div id="loading-container"></div>
  </div>
</body>

</html>
